name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: npm

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install dependencies
        run: npm ci

      - name: Set Vite base path
        run: |
          if [ -f "public/CNAME" ]; then
            echo "VITE_BASE_URL=/" >> $GITHUB_ENV
          else
            echo "VITE_BASE_URL=/${{ github.event.repository.name }}/" >> $GITHUB_ENV
          fi

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Upload OSS artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-oss
          path: dist

  deploypages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
  
  deployoss:
    environment:
      name: oss-pages
      url: "https://localdce.ariels.xyz"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist-oss
          path: ${{ github.workspace }}/dist

      - name: Install ossutil 2.2.2
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip
          curl -fSL -o ossutil-2.2.2-linux-amd64.zip https://gosspublic.alicdn.com/ossutil/v2/2.2.2/ossutil-2.2.2-linux-amd64.zip
          unzip -q ossutil-2.2.2-linux-amd64.zip
          chmod +x ossutil-2.2.2-linux-amd64/ossutil
          sudo mv ossutil-2.2.2-linux-amd64/ossutil /usr/local/bin/ossutil
          sudo ln -sf /usr/local/bin/ossutil /usr/bin/ossutil
          ossutil version

      - name: Validate OSS secrets
        env:
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
        run: |
          test -n "$OSS_BUCKET"
          test -n "$OSS_REGION"
          test -n "$OSS_ACCESS_KEY_ID"
          test -n "$OSS_ACCESS_KEY_SECRET"

      - name: Upload dist to OSS
        env:
          OSS_BUCKET: ${{ secrets.ALIYUN_OSS_BUCKET }}
          OSS_REGION: ${{ secrets.ALIYUN_OSS_REGION }}
          OSS_ENDPOINT: ${{ secrets.ALIYUN_OSS_ENDPOINT }}
          OSS_ACCESS_KEY_ID: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_OSS_ACCESS_KEY_SECRET }}
        run: |
          DIST_DIR="$GITHUB_WORKSPACE/dist"
          if [ ! -d "$DIST_DIR" ] && [ -d "$GITHUB_WORKSPACE/dist-oss/dist" ]; then
            DIST_DIR="$GITHUB_WORKSPACE/dist-oss/dist"
          fi
          if [ ! -d "$DIST_DIR" ]; then
            echo "dist directory not found"
            ls -la "$GITHUB_WORKSPACE"
            exit 1
          fi
          echo "Uploading from: $DIST_DIR"
          if [ -n "$OSS_ENDPOINT" ]; then
            ossutil ls "oss://$OSS_BUCKET/" --region "$OSS_REGION" --endpoint "$OSS_ENDPOINT" --loglevel debug
          else
            ossutil ls "oss://$OSS_BUCKET/" --region "$OSS_REGION" --loglevel debug
          fi
          if [ -n "$OSS_ENDPOINT" ]; then
            ossutil cp "$DIST_DIR/" "oss://$OSS_BUCKET/" -r --force --region "$OSS_REGION" --endpoint "$OSS_ENDPOINT" --loglevel debug
          else
            ossutil cp "$DIST_DIR/" "oss://$OSS_BUCKET/" -r --force --region "$OSS_REGION" --loglevel debug
          fi

      - name: Upload ossutil report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ossutil-report
          path: |
            ossutil_output
            /home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}/ossutil_output
          if-no-files-found: ignore
